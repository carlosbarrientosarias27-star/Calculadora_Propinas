name: CI Calculadora de Propinas

on:
  push:
    branches: [ "main"]
  pull_request:
    branches: [ "main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14-dev"]

    steps:
    - name: Descargar código del repositorio
      uses: actions/checkout@v4

    - name: Configurar Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Instalar todas las dependencias
      run: |
        python -m pip install --upgrade pip
        # Instalamos el kit completo: tests, cobertura, seguridad y linter
        pip install pytest pytest-cov bandit flake8
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Revisión de Estilo (Flake8)
      run: |
        # Primero revisamos errores críticos que detienen el build
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Luego revisamos estilo general (longitud de línea, complejidad, etc.)
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Análisis de Seguridad (Bandit)
      run: |
        # Buscamos vulnerabilidades en la carpeta 'app'
        bandit -r app/ -ll

    - name: Ejecutar pruebas y Cobertura (Pytest-cov)
      run: |
        # Corremos los tests y medimos qué porcentaje del código en 'app' se ejecutó
        pytest --cov=app --cov-report=term-missing