name: CI Calculadora de Propinas

on:
  push:
    branches: [ "main"]
  pull_request:
    branches: [ "main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      # 'fail-fast: false' asegura que si la 3.14 falla, 
      # las demás versiones (como la 3.12) terminen de probarse.
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14-dev"]

    steps:
    - name: Descargar código del repositorio
      uses: actions/checkout@v4

    - name: Configurar Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pytest  # Nos aseguramos de que pytest esté instalado

    - name: Ejecutar pruebas con Pytest
      run: |
        pytest